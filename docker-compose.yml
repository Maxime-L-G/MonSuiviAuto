services:
  mysql:
    image: mysql:8.0
    container_name: monsuiviauto-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: monsuiviauto
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: monsuiviauto-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./apps/api
    container_name: monsuiviauto-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
    environment:
      DATABASE_URL: mysql://app:app@mysql:3306/monsuiviauto
      JWT_SECRET: change-moi-en-prod
      JWT_EXPIRES_IN: 1h
      MONGODB_URI: mongodb://mongo:27017/monsuiviauto_audit
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: http://localhost:4000
    container_name: monsuiviauto-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  mysql_data:
  mongo_data:
  uploads_data:
